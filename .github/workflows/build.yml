name: Build
on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            ext: ""
          - os: macos-latest
            ext: ""
          - os: windows-latest
            ext: ".exe"
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libudev-dev

      - name: Build
        run: cargo build --release
        working-directory: src-tauri

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: modem-cat-${{ matrix.os }}
          path: src-tauri/target/release/modem-cat${{ matrix.ext }}
